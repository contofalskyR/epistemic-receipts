name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: epistemic_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/epistemic_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/epistemic_test
      NODE_ENV: test

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Check migration drift
        # Redesigned 2026-07-07: fails only on NEW drift. The incident left
        # real, accepted drift (ApiKey columns, Org unique, stale embedding
        # columns) plus objects Prisma's DSL can't express (HNSW/expression
        # indexes) — inventoried in .github/known-migration-drift.txt. This
        # step diffs migrations→schema, qualifies each summary line with its
        # table, and compares against that allowlist:
        #   line not in allowlist  → NEW drift → fail (fix schema/migrations,
        #                            or consciously extend the allowlist)
        #   allowlist line missing → resolved → informational (prune the file)
        # `--from-migrations` replays into a shadow DB, so --shadow-database-url
        # is REQUIRED. If Prisma's summary wording changes on upgrade, this
        # fails loudly with the delta — update the allowlist wording then.
        run: |
          set -euo pipefail
          PGPASSWORD=postgres psql -h localhost -U postgres -d postgres \
            -c "CREATE DATABASE epistemic_shadow;"
          npx prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema-datamodel prisma/schema.prisma \
            --shadow-database-url "postgresql://postgres:postgres@localhost:5432/epistemic_shadow" \
            > drift-raw.txt
          cat drift-raw.txt

          # Qualify each [+]/[-]/[*] summary line with its table name.
          awk '
            /^\[\*\] Changed the `/ { t=$0; gsub(/.*`/,"",t); table=$0; gsub(/^\[\*\] Changed the `/,"",table); gsub(/` table.*/,"",table); next }
            /^[[:space:]]*\[[-+*]\]/ { line=$0; sub(/^[[:space:]]+/,"",line); print (table=="" ? "(top)" : table) " :: " line }
          ' drift-raw.txt | sort -u > drift-current.txt

          grep -v '^#' .github/known-migration-drift.txt | grep -v '^[[:space:]]*$' | sort -u > drift-known.txt

          NEW=$(comm -23 drift-current.txt drift-known.txt || true)
          RESOLVED=$(comm -13 drift-current.txt drift-known.txt || true)

          if [ -n "$RESOLVED" ]; then
            echo "::notice::Resolved drift (prune .github/known-migration-drift.txt):"
            echo "$RESOLVED"
          fi
          if [ -n "$NEW" ]; then
            echo "::error::NEW migration drift (not in .github/known-migration-drift.txt):"
            echo "$NEW"
            exit 1
          fi
          if [ ! -s drift-current.txt ]; then
            echo "No drift at all — delete .github/known-migration-drift.txt and restore --exit-code."
          else
            echo "Only known drift present ($(wc -l < drift-current.txt | tr -d ' ') lines) — OK."
          fi
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DIRECT_URL: ${{ env.DIRECT_URL }}

      - name: Apply migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DIRECT_URL: ${{ env.DIRECT_URL }}

      - name: Run integration tests
        run: npm run test:integration
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DIRECT_URL: ${{ env.DIRECT_URL }}
          ADMIN_TOKEN: ci-test-admin-token-not-secret
          NODE_ENV: test

      - name: Verify pipeline registry
        run: npx tsx scripts/verify-registry.ts
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DIRECT_URL: ${{ env.DIRECT_URL }}

      - name: Secret scanning
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sourcemaps:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: quality
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (for sourcemap upload)
        run: npx prisma generate && npx next build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/epistemic_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/epistemic_test
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        continue-on-error: true
