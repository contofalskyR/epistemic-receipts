name: Nightly Integrity Check

# Nightly cron killed 2026-07-22 per owner — the check remains runnable on
# demand via workflow_dispatch. Note: the 2026-07-22 run (first with tsx)
# still failed in ~55s, so the residual cause is environmental (DATABASE_URL
# secret) or a real data-integrity finding — the manual run's log will say.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run integrity checks
        # tsx (a devDependency) instead of ts-node: ts-node is NOT in package.json,
        # so `npx ts-node` fetched an unpinned copy from the registry on every run.
        run: |
          npx tsx scripts/check-integrity.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
