name: Notify Telegram on AUTO commit

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: startsWith(github.event.head_commit.message, '[AUTO]')
    steps:
      - name: Send Telegram notification
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          TEXT="🤖 ER auto-edit: ${COMMIT_MSG}%0A%0Ahttps://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${TEXT}" \
            -d "parse_mode=HTML" \
            --fail
