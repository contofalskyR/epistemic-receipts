name: P127 — Library of Congress Ingest

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (no DB writes)'
        required: false
        default: 'false'
        type: boolean

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Run LoC ingest
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npx tsx scripts/ingest-loc-collections.ts --dry-run
          else
            npx tsx scripts/ingest-loc-collections.ts --full
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
