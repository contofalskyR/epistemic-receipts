name: P127 — Library of Congress Ingest

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (no DB writes)'
        required: false
        default: 'false'
        type: boolean

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Run LoC ingest
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            npx tsx scripts/ingest-loc-collections.ts --dry-run
          else
            npx tsx scripts/ingest-loc-collections.ts --full
          fi
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          ALLOW_EDITS: ${{ secrets.ALLOW_EDITS }}
